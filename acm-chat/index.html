<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ACM CHAT</title>
    <link rel="icon" href="logo.png">
    <script src="/socket.io/socket.io.js"></script>
    <style>
        :root { --primary: #075e54; --secondary: #25d366; --bg: #e5ddd5; }
        
        /* SEGURIDAD CSS: Evita la selección de texto en toda la app */
        * { 
            box-sizing: border-box; 
            font-family: 'Segoe UI', sans-serif; 
            -webkit-tap-highlight-color: transparent; 
            -webkit-user-select: none;
            -moz-user-select: none;
            -ms-user-select: none;
            user-select: none;
        }

        body { margin: 0; background: var(--bg); height: 100vh; display: flex; overflow: hidden; }

        @keyframes popIn {
            0% { opacity: 0; transform: scale(0.8) translateY(10px); }
            100% { opacity: 1; transform: scale(1) translateY(0); }
        }

        #welcome { position: fixed; inset: 0; background: var(--primary); color: white; display: flex; justify-content: center; align-items: center; z-index: 3000; transition: 0.8s; }
        #login-screen { position: fixed; inset: 0; background: var(--primary); display: flex; justify-content: center; align-items: center; z-index: 2000; }
        .login-box { background: white; padding: 25px; border-radius: 15px; width: 90%; max-width: 360px; text-align: center; }
        .captcha-card { background: #f0f2f5; padding: 15px; border-radius: 10px; margin: 15px 0; border: 1px solid #ddd; }

        #sidebar { width: 350px; background: white; border-right: 1px solid #ddd; display: flex; flex-direction: column; z-index: 100; transition: 0.3s; }
        .side-header { background: var(--primary); padding: 12px 15px; color: white; display: flex; justify-content: space-between; align-items: center; font-weight: bold; }
        .side-header div { display: flex; align-items: center; gap: 10px; }
        .logo-img { width: 32px; height: 32px; border-radius: 50%; background: white; padding: 2px; }

        .list-container { overflow-y: auto; flex: 1; }
        .item { padding: 12px 15px; border-bottom: 1px solid #f2f2f2; cursor: pointer; display: flex; justify-content: space-between; align-items: center; }
        .badge { background: #e9ecef; padding: 2px 8px; border-radius: 10px; font-size: 11px; font-weight: bold; }

        .ad-sidebar { background: #f9f9f9; padding: 10px; text-align: center; border-top: 1px solid #ddd; min-height: 100px; font-size: 10px; color: #999; }

        #main { flex: 1; display: flex; flex-direction: column; position: relative; background: var(--bg); }
        .main-header { background: #ededed; padding: 12px 15px; border-bottom: 1px solid #ddd; font-weight: bold; display: flex; align-items: center; }
        .ad-top-chat { background: #fff; padding: 5px; text-align: center; border-bottom: 1px solid #ddd; font-size: 10px; color: #999; max-height: 60px; overflow: hidden; }

        #messages { flex: 1; overflow-y: auto; padding: 15px; display: flex; flex-direction: column; scroll-behavior: smooth; }
        .bubble { padding: 8px 12px; border-radius: 8px; max-width: 85%; margin-bottom: 8px; box-shadow: 0 1px 1px rgba(0,0,0,0.1); animation: popIn 0.2s ease-out; }
        .me { align-self: flex-end; background: #dcf8c6; border-top-right-radius: 0; }
        .other { align-self: flex-start; background: white; border-top-left-radius: 0; }
        
        #input-area { background: #f0f0f0; padding: 10px; display: flex; }
        
        /* Permitir selección de texto SOLO en el input para que puedan escribir */
        #msg-input, #u-in, #cap-a, #r-in { 
            flex: 1; border: none; padding: 12px 15px; border-radius: 25px; outline: none; font-size: 16px; 
            -webkit-user-select: text; -moz-user-select: text; -ms-user-select: text; user-select: text;
        }

        #send-btn { background: var(--primary); color: white; border: none; width: 45px; height: 45px; border-radius: 50%; margin-left: 8px; cursor: pointer; font-weight: bold; }

        @media (max-width: 768px) {
            #sidebar { width: 100%; position: absolute; height: 100%; }
            .chat-open #sidebar { transform: translateX(-100%); }
            #back-btn { display: inline-block !important; margin-right: 10px; }
        }
        .hidden { display: none !important; }
    </style>
</head>
<body id="body-tag">

    <audio id="snd-send" src="https://assets.mixkit.co/active_storage/sfx/2354/2354-preview.mp3"></audio>
    <audio id="snd-recv" src="https://assets.mixkit.co/active_storage/sfx/2358/2358-preview.mp3"></audio>

    <div id="welcome"><h1>ACM CHAT</h1></div>

    <div id="login-screen" class="hidden">
        <div class="login-box">
            <img src="logo.png" style="width: 80px; margin-bottom: 10px;">
            <h2 style="color: var(--primary); margin: 0 0 10px 0;">INGRESO</h2>
            <input type="text" id="u-in" style="width:100%; padding:12px; border:1px solid #ddd; border-radius:8px;" placeholder="Tu usuario...">
            <div class="captcha-card">
                <span id="cap-q" style="font-size:18px; font-weight:bold;"></span>
                <input type="number" id="cap-a" style="width:60px; padding:8px; margin-left:10px;">
            </div>
            <button id="l-btn" style="width:100%; padding:14px; background: var(--secondary); color:white; border:none; border-radius:8px; font-weight:bold; cursor:pointer;">ENTRAR</button>
        </div>
    </div>

    <div id="app-screen" class="hidden" style="display: flex; width: 100%; height: 100%;">
        <div id="sidebar">
            <div class="side-header">
                <div>
                    <img src="logo.png" class="logo-img" alt="logo">
                    <span>ACM CHAT</span>
                </div>
                <span id="total-on" style="background:var(--secondary); padding:2px 8px; border-radius:10px; font-size:12px;">0</span>
            </div>
            <div style="padding:10px;"><input type="text" id="r-in" placeholder="Nueva sala..." style="width:100%; border-radius:20px; border:1px solid #ddd; padding:10px; outline:none;"></div>
            <div class="list-container" id="r-list"></div>
            <div style="font-size: 11px; color: #999; padding: 10px; background:#f8f9fa; font-weight:bold;">EN LINEA</div>
            <div class="list-container" id="u-list"></div>
            
            <div class="ad-sidebar">
                PUBLICIDAD<br>
            </div>
        </div>

        <div id="main">
            <div class="main-header">
                <button id="back-btn" style="display:none; background:none; border:none; font-size:20px;" onclick="closeChat()"><</button>
                <span id="c-title">MENSAJES</span>
            </div>

            <div class="ad-top-chat">
                ANUNCIO<br>
            </div>

            <div id="messages"></div>
            <div id="input-area" class="hidden">
                <input type="text" id="msg-input" placeholder="Escribe aqui..." autocomplete="off">
                <button id="send-btn">OK</button>
            </div>
        </div>
    </div>

<script>
    // --- SEGURIDAD: BLOQUEO DE INSPECCIÓN Y CLIC DERECHO ---
    document.oncontextmenu = function(){ return false; };
    document.onkeydown = function(e) {
        // Bloquear F12
        if (e.keyCode == 123) return false;
        // Bloquear Ctrl+Shift+I, J, C
        if (e.ctrlKey && e.shiftKey && [73, 74, 67].includes(e.keyCode)) return false;
        // Bloquear Ctrl+U
        if (e.ctrlKey && e.keyCode == 85) return false;
    };

    const socket = io();
    let u = {}, active = { id: '', p: false }, cAns, idleTimer;
    let hist = JSON.parse(localStorage.getItem('acm_chat_data')) || {};

    function resetIdleTimer() {
        clearTimeout(idleTimer);
        idleTimer = setTimeout(() => { location.reload(); }, 600000); 
    }
    document.onmousemove = document.onkeypress = document.ontouchstart = resetIdleTimer;

    setTimeout(() => {
        document.getElementById('welcome').style.opacity = '0';
        setTimeout(() => {
            document.getElementById('welcome').classList.add('hidden');
            document.getElementById('login-screen').classList.remove('hidden');
            genCap();
        }, 800);
    }, 2000);

    function genCap() {
        const a = Math.floor(Math.random()*9)+1, b = Math.floor(Math.random()*9)+1;
        cAns = a + b;
        document.getElementById('cap-q').innerText = `${a} + ${b} =`;
    }

    document.getElementById('l-btn').onclick = () => {
        const n = document.getElementById('u-in').value.trim();
        if(n && parseInt(document.getElementById('cap-a').value) === cAns) socket.emit('attempt_login', n);
        else { alert("Error"); genCap(); }
    };

    socket.on('login_response', (r) => {
        u = { n: r.username, id: r.userId };
        document.getElementById('login-screen').classList.add('hidden');
        document.getElementById('app-screen').classList.remove('hidden');
    });

    socket.on('update_rooms', (data) => {
        const l = document.getElementById('r-list'); l.innerHTML = '';
        const rooms = data.rooms || data, counts = data.counts || {};
        Object.keys(rooms).forEach(n => {
            const d = document.createElement('div'); d.className = 'item';
            d.innerHTML = `<span># ${n}</span><span class="badge">${counts[n] || 0}</span>`;
            d.onclick = () => { active = {id:n, p:false}; socket.emit('join_room', n); ui(n); };
            l.appendChild(d);
        });
    });

    socket.on('update_online_users', (us) => {
        const l = document.getElementById('u-list'); l.innerHTML = '';
        us.forEach(user => {
            if(user.id !== u.id) {
                const d = document.createElement('div'); d.className = 'item';
                d.innerHTML = `<span>USUARIO: ${user.name}</span>`;
                d.onclick = () => { active = {id:user.id, p:true}; ui(user.name); };
                l.appendChild(d);
            }
        });
    });

    socket.on('update_total_count', (c) => document.getElementById('total-on').innerText = c);

    function ui(t) {
        document.getElementById('body-tag').classList.add('chat-open');
        document.getElementById('c-title').innerText = (active.p ? "PRIVADO: " : "SALA: ") + t;
        document.getElementById('input-area').classList.remove('hidden');
        render();
    }

    function send() {
        const t = document.getElementById('msg-input').value.trim();
        if(!t) return;
        if(active.p) socket.emit('send_private_message', { toId: active.id, text: t });
        else socket.emit('send_group_message', { room: active.id, text: t });
        document.getElementById('snd-send').play();
        document.getElementById('msg-input').value = '';
    }

    document.getElementById('send-btn').onclick = send;
    document.getElementById('msg-input').onkeypress = (e) => { if(e.key==='Enter') send(); };

    socket.on('new_group_message', (d) => { 
        if(d.userId !== u.id) document.getElementById('snd-recv').play();
        sv(d.room, d); 
    });
    
    socket.on('new_private_message', (d) => { 
        if(d.fromId !== u.id) document.getElementById('snd-recv').play();
        sv(d.chatWith, d); 
    });

    function sv(k, d) {
        if(!hist[k]) hist[k] = [];
        hist[k].push(d);
        localStorage.setItem('acm_chat_data', JSON.stringify(hist));
        if(active.id === k) render();
    }

    function render() {
        const c = document.getElementById('messages'); c.innerHTML = '';
        const chat = hist[active.id] || [];
        chat.forEach(m => {
            const me = (m.userId === u.id || m.fromId === u.id);
            const d = document.createElement('div'); 
            d.className = `bubble ${me ? 'me' : 'other'}`;
            d.innerHTML = `${!me ? `<small style="color:var(--primary);font-weight:bold;display:block;">${m.user||m.fromName}</small>` : ''}${m.text}<span style="font-size:9px;color:#999;display:block;text-align:right;">${m.time}</span>`;
            c.appendChild(d);
        });
        c.scrollTop = c.scrollHeight;
    }

    function closeChat() { document.getElementById('body-tag').classList.remove('chat-open'); }

    document.getElementById('r-in').onkeypress = (e) => {
        if(e.key==='Enter' && e.target.value) { 
            const n = e.target.value.toUpperCase();
            active = {id:n, p:false}; socket.emit('join_room', n); ui(n); e.target.value=''; 
        }
    };

    socket.on('force_clear_history', () => {
        localStorage.removeItem('acm_chat_data');
        hist = {};
        document.getElementById('messages').innerHTML = '';
        alert("Un administrador ha limpiado el historial de mensajes.");
    });
</script>
</body>
</html>
